<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Étudiants</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🎓 Liste des Étudiants</h2>
        <a href="/web/inscriptions" class="btn btn-primary">Voir les Inscriptions</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Prénom</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="etudiant : ${etudiants}">
                <td th:text="${etudiant.id}">1</td>
                <td th:text="${etudiant.prenom}">Jean</td>
                <td th:text="${etudiant.nom}">Dupont</td>
                <td th:text="${etudiant.email}">jean.dupont@univ.fr</td>
                <td>
                    <a th:href="@{/web/etudiants/supprimer/{id}(id=${etudiant.id})}" 
                       class="btn btn-danger btn-sm" 
                       onclick="return confirm('Supprimer cet étudiant ?')">Supprimer</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="card mt-5">
        <div class="card-header bg-success text-white"><h5>Ajouter un nouvel étudiant</h5></div>
        <div class="card-body">
            <form th:action="@{/web/etudiants/ajouter}" method="POST" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Prénom</label>
                    <input type="text" name="prenom" class="form-content form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Nom</label>
                    <input type="text" name="nom" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">Enregistrer l'étudiant</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
