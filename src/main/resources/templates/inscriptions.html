<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Inscriptions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <h2 class="mb-4">Liste des Inscriptions (Jointure Réussie)</h2>
    
    <div class="d-flex gap-2 mb-4">
        <a href="/web/etudiants" class="btn btn-outline-primary">Gérer les Étudiants</a>
        <a href="/web/cours" class="btn btn-outline-primary">Gérer les Cours</a>
        <a href="/web/inscriptions/ajouter" class="btn btn-success">➕ Inscrire un Étudiant</a>
    </div>
    
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID Inscription</th>
                <th>Étudiant</th>
                <th>Email</th>
                <th>Cours</th>
                <th>Code Cours</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ins : ${inscriptions}">
                <td th:text="${ins.id}">1</td>
                <td th:text="${ins.etudiant.prenom + ' ' + ins.etudiant.nom}">Jean Dupont</td>
                <td th:text="${ins.etudiant.email}">jean.dupont@univ.fr</td>
                <td th:text="${ins.cours.titre}">Architecture Logicielle</td>
                <td th:text="${ins.cours.code}">INFO-301</td>
                <td th:text="${ins.dateInscription}">2026-07-02</td>
                <td>
                    <a th:href="@{/web/inscriptions/supprimer/{id}(id=${ins.id})}" 
                       class="btn btn-danger btn-sm" 
                       onclick="return confirm('Annuler cette inscription ?')">Annuler</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a href="/api/inscriptions" class="btn btn-outline-secondary" target="_blank">Voir l'API REST JSON</a>
    </div>

</body>
</html>
