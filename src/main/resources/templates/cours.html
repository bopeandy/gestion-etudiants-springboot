<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Cours</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📚 Liste des Cours</h2>
        <a href="/web/inscriptions" class="btn btn-primary">Voir les Inscriptions</a>
    </div>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Code du Cours</th>
                <th>Titre du Cours</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${lesCours}">
                <td th:text="${c.id}">1</td>
                <td th:text="${c.code}">INFO-301</td>
                <td th:text="${c.titre}">Architecture Logicielle</td>
                <td>
                    <a th:href="@{/web/cours/supprimer/{id}(id=${c.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Supprimer ce cours ?')">Supprimer</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="card mt-5">
        <div class="card-header bg-success text-white"><h5>Ajouter un nouveau cours</h5></div>
        <div class="card-body">
            <form th:action="@{/web/cours/ajouter}" method="POST" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Code du Cours</label>
                    <input type="text" name="code" class="form-control" placeholder="ex: MAT-101" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Titre du Cours</label>
                    <input type="text" name="titre" class="form-control" placeholder="ex: Algèbre Linéaire" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">Enregistrer le cours</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
