<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assigner un Cours</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>📝 Nouvelle Inscription</h2>
                <a href="/web/inscriptions" class="btn btn-secondary btn-sm">Retour à la liste</a>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Assigner un cours à un étudiant</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/web/inscriptions/ajouter}" method="POST">
                        
                        <div class="mb-3">
                            <label for="etudiantId" class="form-label">Sélectionner l'Étudiant</label>
                            <select class="form-select" id="etudiantId" name="etudiantId" required>
                                <option value="" disabled selected>-- Choisir un étudiant --</option>
                                <option th:each="etudiant : ${lesEtudiants}" 
                                        th:value="${etudiant.id}" 
                                        th:text="${etudiant.prenom + ' ' + etudiant.nom + ' (' + etudiant.email + ')'}">
                                    Jean Dupont (jean@univ.fr)
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="coursId" class="form-label">Sélectionner le Cours</label>
                            <select class="form-select" id="coursId" name="coursId" required>
                                <option value="" disabled selected>-- Choisir un cours --</option>
                                <option th:each="cours : ${lesCours}" 
                                        th:value="${cours.id}" 
                                        th:text="${'[' + cours.code + '] ' + cours.titre}">
                                    [INFO-301] Architecture Logicielle
                                </option>
                            </select>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Valider l'inscription</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
